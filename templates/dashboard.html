<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <h3 style="color: white;">🏥 Hospital Dashboard</h3>
    <a href="/logout" class="logout-btn">Logout</a>
</div>

<div class="container">

    <h2>Dashboard</h2>

    <!-- ADD PATIENT -->
    <h3>Add Patient</h3>
    <form method="POST" action="/add_patient">
        <input name="name" placeholder="Name" required>
        <input name="age" placeholder="Age" required>
        <input name="disease" placeholder="Disease" required>
        <button>Add Patient</button>
    </form>

    <!-- PATIENT LIST -->
    <h3>Patients</h3>
    <ul>
        {% for p in patients %}
            <li>👤 {{ p[1] }} | Disease: {{ p[3] }}</li>
        {% endfor %}
    </ul>

    <!-- ADD DOCTOR -->
    <h3>Add Doctor</h3>
    <form method="POST" action="/add_doctor">
        <input name="name" placeholder="Doctor Name" required>
        <input name="specialization" placeholder="Specialization" required>
        <button>Add Doctor</button>
    </form>

    <!-- ADD APPOINTMENT -->
    <h3>Book Appointment</h3>
    <form method="POST" action="/add_appointment">
        <input name="patient_id" placeholder="Patient ID" required>
        <input name="doctor_id" placeholder="Doctor ID" required>
        <input name="date" type="date" required>
        <button>Book</button>
    </form>

</div>

</body>
</html>
